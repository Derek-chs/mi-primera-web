<!DOCTYPE html>
<html lang="es"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Restaurante</title>

<style> 
*{ 
  margin:0; 
  padding:0; 
  box-sizing:border-box; 
  font-family: Arial, sans-serif; 
} 

body{
  background:#111;
  color:white;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background: rgba(0,0,0,0.7);
  z-index:1000;
}

.navbar h2{
  font-size:24px;
}

.nav-links{
  display:flex;
  gap:20px;
}

.nav-links a{
  color:white;
  text-decoration:none;
}

.nav-links a:hover{
  color:#ff4d4d;
}

/* HERO SOLO IMAGEN */
.hero{ 
  background: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5')
  no-repeat center center/cover; 
  height:100vh; 
}

/* SECCIONES */
section{
  padding:60px 20px;
  text-align:center;
}

img{
  margin:10px;
  border-radius:10px;
}

/* FOOTER */
footer{
  background:black;
  padding:20px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  font-size:25px;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
}
</style>
</head>

<body> 

<!-- NAVBAR -->
<div class="navbar">
  <h2>🍔 El Sabor</h2>
  <div class="nav-links">
    <a href="#">Inicio</a>
    <a href="#">Menú</a>
    <a href="#">Galería</a>
    <a href="#">Contacto</a>
  </div>
</div>

<!-- HERO (SIN TEXTO) -->
<div class="hero"></div>

<!-- MENU -->
<section>
  <h2> 𝙼𝙰𝚁𝙴𝙰 𝙱𝙰𝙹𝙰 </h2>
  <p>Hamburguesas, pizzas, tacos y más</p>
</section>

<!-- GALERIA -->
<section>
  <h2>📸 Galería</h2>
  <img src="https://images.unsplash.com/photo-1555992336-03a23c7b20ee" width="300">
  <img src="https://images.unsplash.com/photo-1541542684-4a9c4c3c5f59" width="300">
</section>

<!-- UBICACION -->
<section>
  <h2>📍 Ubicación</h2>
  <iframe 
    src="https://www.google.com/maps?q=Jaco,CostaRica&output=embed"
    width="100%" height="300">
  </iframe>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Restaurante El Sabor</p>
</footer>

<!-- WHATSAPP -->
<a href="https://wa.me/50688888888" target="_blank" class="whatsapp">💬</a>

</body> 
</html>
