<!DOCTYPE html>
<html lang="es"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Restaurante</title>

<style> 
*{ 
  margin:0; 
  padding:0; 
  box-sizing:border-box; 
  font-family: Arial, sans-serif; 
} 

body, html{ 
  height:100%; 
} 

/* 🔥 NAVBAR ARRIBA */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background: rgba(0,0,0,0.8);
  color:white;
  z-index:1000;
}

.navbar h2{
  font-size:24px;
}

.nav-links{
  display:flex;
  gap:20px;
}

.nav-links a{
  color:white;
  text-decoration:none;
  font-size:16px;
}

.nav-links a:hover{
  color:#ff4d4d;
}

/* 🔥 HERO */
.hero{ 
  background: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5')
  no-repeat center center/cover; 
  height:100vh; 
  display:flex; 
  justify-content:center;
  align-items:center; 
  text-align:center; 
  color:white; 
} 

/* CAPA OSCURA */
.overlay{ 
  background: rgba(0,0,0,0.6); 
  padding:40px; 
  border-radius:10px; 
} 

h1{ 
  font-size:60px; 
  margin-bottom:20px; 
} 

.menu{ 
  display:flex; 
  gap:20px; 
  justify-content:center; 
  flex-wrap:wrap; 
} 

.menu a{ 
  text-decoration:none;
  color:white;
  border:2px solid white; 
  padding:12px 25px;
  border-radius:30px;
  transition:0.3s; 
}

.menu a:hover{
  background:white; 
  color:black;
} 
</style>
</head>

<body> 

<!-- 🔥 BARRA ARRIBA -->
<div class="navbar">
  <h2>🍔 El Sabor</h2>
  <div class="nav-links">
    <a href="#">Inicio</a>
    <a href="#">Menú</a>
    <a href="#">Galería</a>
    <a href="#">Contacto</a>
  </div>
</div>

<!-- 🔥 HERO -->
<div class="hero"> 
  <div class="overlay"> 
    <h1>MI RESTAURANTE EL SABOR</h1>
    <div class="menu"> 
      <a href="#">🍽 Menú</a> 
      <a href="#">📅 Reservas</a> 
      <a href="#">📍 Ubicación</a> 
      <a href="#">📞 Contacto</a> 
    </div> 
  </div> 
</div> 

</body> 
</html>
